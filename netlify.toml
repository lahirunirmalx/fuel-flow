# Netlify: static Vite build + serverless functions only (no Node/Express app).
# Set GEMINI_API_KEY in Site → Environment variables (scope: Functions)

[dev]
  command = "npm run dev"
  targetPort = 3000

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Rewrite /api/generate-fact to the serverless function (must be before SPA rule)
[[redirects]]
  from = "/api/generate-fact"
  to = "/.netlify/functions/generate-fact"
  status = 200

[[redirects]]
  from = "/api/fuel-prices"
  to = "/.netlify/functions/fuel-prices"
  status = 200

# SPA: serve index.html for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
